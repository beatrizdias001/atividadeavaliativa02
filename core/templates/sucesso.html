<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Enviada com Sucesso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
        }
        
        h1 {
            color: #000;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .data-section {
            margin-bottom: 20px;
        }
        
        .data-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ccc;
        }
        
        .data-item:last-child {
            border-bottom: none;
        }
        
        .data-label {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .data-value {
            color: #666;
            padding-left: 10px;
        }
        
        .actions {
            margin-top: 20px;
        }
        
        a {
            display: inline-block;
            margin-right: 10px;
            padding: 10px 20px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 3px;
        }
        
        a:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Avaliação Enviada com Sucesso!</h1>
        
        <div class="data-section">
            <div class="data-item">
                <div class="data-label">Nome:</div>
                <div class="data-value">{{ nome }}</div>
            </div>
            
            <div class="data-item">
                <div class="data-label">Comentário:</div>
                <div class="data-value">{{ comentario }}</div>
            </div>
            
            <div class="data-item">
                <div class="data-label">Nota:</div>
                <div class="data-value">{{ nota }} / 5</div>
            </div>
        </div>
        
        <div class="actions">
            <a href="/">Voltar para Página Inicial</a>
        </div>
    </div>
</body>
</html>
