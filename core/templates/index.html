<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Livro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
        }
        
        .book-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .book-cover {
            width: 100px;
            height: 150px;
            margin: 0 auto 20px;
            background: #ddd;
            border: 1px solid #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            overflow: hidden;
        }

        .book-cover img {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
        
        h1 {
            color: #000;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="book-section">
            <div class="book-cover">
                <img src="/static/images/capa.jpg" alt="O Amor Não É Óbvio">
            </div>
            <h1>O Amor Não É Óbvio</h1>
        </div>
        
        <form method="POST" action="/avaliacao">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            
            <div class="form-group">
                <label for="comentario">Comentário:</label>
                <textarea id="comentario" name="comentario" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="nota">Nota:</label>
                <select id="nota" name="nota" required>
                    <option value="">Selecione uma nota</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
